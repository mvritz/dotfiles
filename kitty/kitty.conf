# Tokyo Night Storm — coordinated with SketchyBar and JankyBorders

# macOS editing shortcuts
map super+backspace send_text all \x17
map super+right     send_text all \x05
map super+left      send_text all \x01

# Shell integration
shell_integration no-sudo no-cursor no-title
macos_option_as_alt yes
copy_on_select yes
allow_remote_control yes

# Typography
font_family      MesloLGS NF
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 13.0

# Cursor
cursor_shape beam
cursor_shape_unfocused hollow
cursor_beam_thickness 1.5
cursor_blink_interval 0.65
cursor_stop_blinking_after 12
cursor #7dcfff
cursor_text_color #1a1b26

# Window surface
hide_window_decorations titlebar-only
window_padding_width 12
background #1a1b26
foreground #c0caf5
background_opacity 0.94
dynamic_background_opacity yes
background_blur 24

# Selection and links
selection_foreground #c0caf5
selection_background #33467c
url_color #7dcfff
url_style single

# Tokyo Night ANSI palette
color0  #414868
color8  #565f89
color1  #f7768e
color9  #f7768e
color2  #73daca
color10 #73daca
color3  #e0af68
color11 #e0af68
color4  #7aa2f7
color12 #7aa2f7
color5  #bb9af7
color13 #bb9af7
color6  #7dcfff
color14 #7dcfff
color7  #a9b1d6
color15 #c0caf5

# Window and bell accents
active_border_color #7aa2f7
inactive_border_color #414868
bell_border_color #ff9e64

# Tabs use the same pill hierarchy as SketchyBar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style round
tab_bar_align left
tab_bar_margin_width 8
tab_bar_margin_height 6 0
tab_bar_background #16161e
tab_bar_margin_color #16161e
active_tab_foreground #16161e
active_tab_background #7aa2f7
active_tab_font_style bold
inactive_tab_foreground #a9b1d6
inactive_tab_background #24283b
inactive_tab_font_style normal
tab_title_max_length 32
tab_title_template "{index}: {title}"
